<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Ashveil — The Broken Veil</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,170,50,.3)}50%{box-shadow:0 0 16px rgba(255,170,50,.6)}}
@keyframes dungeonPulse{0%,100%{border-color:rgba(123,104,238,.3)}50%{border-color:rgba(123,104,238,.7)}}
:root{--bg:#08090d;--panel:#0e1117;--panel2:#151a24;--panel3:#1a2030;--line:#2a3347;--line2:#1e2738;--text:#d4dae8;--muted:#7a8ba8;--bright:#f0f4ff;--fire:#ff6b35;--fire2:#ff9f1a;--ember:#cc4a1a;--veil:#7b68ee;--veil2:#9b8afb;--veil3:#5b4ecc;--nature:#3ddc84;--nature2:#2ebd6b;--water:#4fc3f7;--water2:#0891b2;--blood:#dc2626;--blood2:#ef4444;--gold:#f59e0b;--gold2:#fbbf24;--ash:#9ca3af;--scholar:#4fc3f7;--ashen:#ff6b35}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif}
#app{display:grid;grid-template-columns:1fr 400px;width:100vw;height:100vh}
#gameWrap{position:relative;overflow:hidden;background:radial-gradient(ellipse at 30% 20%,rgba(123,104,238,.06),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,107,53,.04),transparent 50%),linear-gradient(180deg,#0a0c14,#060810)}
#game{width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none;cursor:crosshair}
#hud{position:absolute;left:14px;top:14px;display:flex;flex-direction:column;gap:6px;z-index:2;pointer-events:none}
.hud-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(8,9,13,.88);border:1px solid rgba(42,51,71,.6);border-radius:8px;backdrop-filter:blur(8px);font-size:13px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}
.hud-bar .icon{font-size:14px}.hud-bar .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px}.hud-bar .value{color:var(--bright);font-weight:600}
.hp-fill{height:6px;border-radius:3px;transition:width .3s}
#minimap{position:absolute;right:14px;top:14px;width:160px;height:120px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:rgba(8,9,13,.85);backdrop-filter:blur(8px);z-index:2}
#minimapCanvas{width:100%;height:100%;image-rendering:pixelated}
#actionBar{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);display:flex;gap:6px;z-index:3;flex-wrap:wrap;justify-content:center;max-width:95%}
.action-btn{appearance:none;border:1px solid var(--line);background:rgba(14,17,23,.92);color:var(--text);border-radius:10px;padding:10px 16px;font-size:13px;font-family:'Crimson Text',serif;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;display:flex;align-items:center;gap:6px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.action-btn:hover{border-color:var(--fire);background:rgba(255,107,53,.1);transform:translateY(-2px)}
.action-btn .key{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;background:rgba(255,255,255,.08);border-radius:4px;color:var(--muted)}
.action-btn.dungeon-btn{border-color:rgba(123,104,238,.4);animation:dungeonPulse 2s infinite}
#side{display:flex;flex-direction:column;border-left:1px solid var(--line2);background:linear-gradient(180deg,#0c0e16,#080a10);overflow:hidden}
#sideHeader{padding:14px 16px 10px;border-bottom:1px solid var(--line2);background:linear-gradient(180deg,rgba(123,104,238,.06),transparent)}
#sideHeader h1{font-family:'Cinzel',serif;font-size:16px;color:var(--veil2);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 20px rgba(123,104,238,.3)}
#sideHeader .subtitle{font-size:12px;color:var(--muted);margin-top:2px;font-style:italic}
#tabs{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;border-bottom:1px solid var(--line2)}
.tabBtn{appearance:none;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:6px;padding:6px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.tabBtn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tabBtn.active{color:var(--fire2);border-color:rgba(255,159,26,.3);background:rgba(255,107,53,.08)}
.panel{display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;gap:10px;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
.panel.active{display:flex;flex-direction:column;animation:fadeIn .3s ease}
.card{background:linear-gradient(135deg,rgba(255,255,255,.025),rgba(255,255,255,.01));border:1px solid var(--line2);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(123,104,238,.2),transparent)}
.card h3{font-family:'Cinzel',serif;font-size:14px;color:var(--veil2);margin-bottom:8px;letter-spacing:1px}
.card h4{font-size:13px;color:var(--fire2);margin-bottom:4px}.card p{font-size:13px;color:var(--muted);line-height:1.5}
.list{display:flex;flex-direction:column;gap:6px}
.item{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:10px;background:rgba(255,255,255,.015);transition:all .2s}
.item:hover{border-color:rgba(123,104,238,.2);background:rgba(123,104,238,.04)}
.item-btn{appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:6px;padding:5px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.item-btn:hover{border-color:var(--fire);color:var(--fire2)}.item-btn:disabled{opacity:.3;cursor:default}
.meter{width:100%;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:4px;transition:width .4s ease}
.meter-hp{background:linear-gradient(90deg,var(--blood),var(--blood2))}
.meter-xp{background:linear-gradient(90deg,var(--veil3),var(--veil2))}
.meter-skill{background:linear-gradient(90deg,var(--nature2),var(--nature))}
.meter-corruption{background:linear-gradient(90deg,#6b21a8,#a855f7)}
.meter-stability{background:linear-gradient(90deg,var(--water2),var(--water))}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:13px}
.tiny{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.muted{color:var(--muted)}.bright{color:var(--bright)}.fire{color:var(--fire2)}.veil{color:var(--veil2)}.nature{color:var(--nature)}.gold{color:var(--gold2)}
.equipGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.slot{min-height:80px;border-radius:8px;border:1px dashed rgba(255,255,255,.1);padding:10px;background:rgba(255,255,255,.015);text-align:center;transition:all .2s;position:relative}
.slot:hover{border-color:rgba(123,104,238,.3)}
.slot .slot-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.slot .slot-item{font-size:12px;color:var(--bright)}
.rarity-common{color:#9ca3af}.rarity-uncommon{color:#3ddc84}.rarity-rare{color:#4fc3f7}.rarity-epic{color:#a78bfa}.rarity-legendary{color:#f59e0b}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.badge-quest{background:rgba(123,104,238,.15);color:var(--veil2);border:1px solid rgba(123,104,238,.3)}
.badge-done{background:rgba(61,220,132,.1);color:var(--nature);border:1px solid rgba(61,220,132,.2)}
.badge-bounty{background:rgba(255,107,53,.1);color:var(--fire);border:1px solid rgba(255,107,53,.2)}
.badge-event{background:rgba(245,158,11,.1);color:var(--gold2);border:1px solid rgba(245,158,11,.2)}
.badge-achievement{background:rgba(79,195,247,.1);color:var(--water);border:1px solid rgba(79,195,247,.2)}
.badge-chapter{background:rgba(155,138,251,.12);color:var(--veil2);border:1px solid rgba(155,138,251,.3)}
.faction-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.faction-card{border-radius:8px;padding:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.015);text-align:center}
.faction-card.highlight{border-color:rgba(123,104,238,.4);background:rgba(123,104,238,.06)}
#dialogue{position:absolute;left:14px;right:14px;bottom:80px;display:none;z-index:4;animation:slideUp .3s ease}
#dialogueBox{max-width:760px;margin:0 auto;background:rgba(8,9,13,.96);border:1px solid var(--line);border-radius:14px;padding:16px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(123,104,238,.08)}
#dialogueBox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--veil),transparent)}
#dialogueSpeaker{font-family:'Cinzel',serif;font-size:13px;color:var(--fire2);letter-spacing:1px;margin-bottom:6px}
#dialogueText{font-size:15px;line-height:1.6;color:var(--bright)}
#dialogueChoices{display:grid;gap:6px;margin-top:12px}
#dialogueChoices button{appearance:none;text-align:left;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);border-radius:8px;padding:10px 14px;font-size:13px;font-family:'Crimson Text',serif;cursor:pointer;transition:all .15s}
#dialogueChoices button:hover{border-color:var(--veil);background:rgba(123,104,238,.08);color:var(--bright)}
#toastWrap{position:absolute;right:14px;bottom:80px;display:flex;flex-direction:column-reverse;gap:6px;z-index:5;pointer-events:none;max-height:300px;overflow:hidden}
.toast{max-width:300px;padding:10px 14px;font-size:12px;line-height:1.4;border-radius:8px;animation:slideUp .3s ease;font-family:'JetBrains Mono',monospace}
.toast-info{background:rgba(8,9,13,.92);border:1px solid var(--line);border-left:3px solid var(--veil);color:var(--text)}
.toast-combat{background:rgba(8,9,13,.92);border:1px solid rgba(220,38,38,.3);border-left:3px solid var(--blood);color:var(--blood2)}
.toast-loot{background:rgba(8,9,13,.92);border:1px solid rgba(61,220,132,.3);border-left:3px solid var(--nature);color:var(--nature)}
.toast-quest{background:rgba(8,9,13,.92);border:1px solid rgba(123,104,238,.3);border-left:3px solid var(--veil);color:var(--veil2)}
.toast-event{background:rgba(8,9,13,.92);border:1px solid rgba(245,158,11,.3);border-left:3px solid var(--gold);color:var(--gold2)}
.toast-achievement{background:rgba(79,195,247,.12);border:1px solid rgba(79,195,247,.4);border-left:3px solid var(--water);color:var(--water)}
.toast-story{background:rgba(155,138,251,.12);border:1px solid rgba(155,138,251,.4);border-left:3px solid var(--veil2);color:var(--veil2)}
.toast-dungeon{background:rgba(123,104,238,.12);border:1px solid rgba(123,104,238,.4);border-left:3px solid var(--veil);color:var(--veil2)}
#eventBanner{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:6;display:none;padding:12px 24px;border-radius:10px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(255,107,53,.1));border:1px solid rgba(245,158,11,.4);font-family:'Cinzel',serif;font-size:14px;color:var(--gold2);text-align:center;text-shadow:0 0 10px rgba(245,158,11,.3);animation:fadeIn .5s ease;pointer-events:none;max-width:90%}
#touchControls{position:absolute;inset:0;pointer-events:none;z-index:6}
#joystickZone{position:absolute;left:18px;bottom:80px;width:120px;height:120px;pointer-events:auto}
#joystickBase,#joystickThumb{position:absolute;border-radius:50%}
#joystickBase{width:90px;height:90px;left:15px;top:15px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
#joystickThumb{width:44px;height:44px;left:38px;top:38px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}
#touchButtons{position:absolute;right:18px;bottom:80px;display:flex;gap:8px;pointer-events:auto}
#touchButtons button{width:56px;height:56px;border-radius:50%;font-size:20px}
@media(min-width:921px){#touchControls{display:none}}
@media(max-width:920px){#app{grid-template-columns:1fr;grid-template-rows:55vh 45vh}#side{border-left:0;border-top:1px solid var(--line2)}#minimap{width:120px;height:90px}}
#portraitOverlay{display:none;position:fixed;inset:0;z-index:9999;background:#0d0d12;color:var(--gold2);flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:'Cinzel',serif;gap:16px}
#portraitOverlay .rotate-icon{font-size:64px;animation:rotateHint 2s ease-in-out infinite}
#portraitOverlay h2{font-size:22px;margin:0;letter-spacing:2px}
#portraitOverlay p{font-size:14px;color:rgba(255,255,255,.5);margin:0;font-family:'Crimson Text',serif}
@keyframes rotateHint{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media(max-width:920px) and (orientation:portrait){#portraitOverlay{display:flex}#app{display:none}}
</style>
</head>
<body>
<div id="portraitOverlay">
<div class="rotate-icon">📱</div>
<h2>Rotate Your Device</h2>
<p>Ashveil is best experienced in landscape mode.<br>Please rotate your device to continue.</p>
</div>
<div id="app">
<div id="gameWrap">
<canvas id="game"></canvas>
<div id="hud"></div>
<div id="minimap"><canvas id="minimapCanvas" width="160" height="120"></canvas></div>
<div id="eventBanner"></div>
<div id="toastWrap"></div>
<div id="dialogue"><div id="dialogueBox"><div id="dialogueSpeaker"></div><h3 id="dialogueText"></h3><div id="dialogueChoices"></div></div></div>
<div id="actionBar">
<button class="action-btn" id="btnAttack">⚔ Attack <span class="key">SPACE</span></button>
<button class="action-btn" id="btnLoot">✦ Gather <span class="key">F</span></button>
<button class="action-btn" id="btnTalk">◈ Interact <span class="key">E</span></button>
<button class="action-btn dungeon-btn" id="btnDungeon" style="display:none">⬡ Enter Dungeon <span class="key">R</span></button>
<button class="action-btn" id="btnSave">Save</button>
<button class="action-btn" id="btnLoad">Load</button>
<button class="action-btn" id="btnFullscreen">Fullscreen</button>
</div>
<div id="touchControls"><div id="joystickZone"><div id="joystickBase"></div><div id="joystickThumb"></div></div><div id="touchButtons"><button class="action-btn" id="touchAttack">⚔</button><button class="action-btn" id="touchLoot">✦</button><button class="action-btn" id="touchTalk">◈</button></div></div>
</div>
<aside id="side">
<div id="sideHeader"><h1>⬥ Ashveil</h1><div class="subtitle">The Veils are weakening...</div></div>
<div id="tabs">
<button class="tabBtn active" data-tab="journal">Journal</button>
<button class="tabBtn" data-tab="story">Story</button>
<button class="tabBtn" data-tab="inventory">Items</button>
<button class="tabBtn" data-tab="equip">Equip</button>
<button class="tabBtn" data-tab="skills">Skills</button>
<button class="tabBtn" data-tab="crafting">Craft</button>
<button class="tabBtn" data-tab="bounty">Bounty</button>
<button class="tabBtn" data-tab="factions">Factions</button>
<button class="tabBtn" data-tab="world">World</button>
<button class="tabBtn" data-tab="dungeon">Dungeon</button>
<button class="tabBtn" data-tab="achieve">Feats</button>
</div>
<section class="panel active" id="panel-journal"></section>
<section class="panel" id="panel-story"></section>
<section class="panel" id="panel-inventory"></section>
<section class="panel" id="panel-equip"></section>
<section class="panel" id="panel-skills"></section>
<section class="panel" id="panel-crafting"></section>
<section class="panel" id="panel-bounty"></section>
<section class="panel" id="panel-factions"></section>
<section class="panel" id="panel-world"></section>
<section class="panel" id="panel-dungeon"></section>
<section class="panel" id="panel-achieve"></section>
</aside>
</div>
<script>
(()=>{
'use strict';
const SAVE_KEY='ashveil_v5_save';
const T=16,MW=120,MH=80,SCALE=3;
const qs=s=>document.querySelector(s),qsa=s=>[...document.querySelectorAll(s)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const sample=a=>a[Math.floor(Math.random()*a.length)],cap=s=>s[0].toUpperCase()+s.slice(1);
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

const canvas=qs('#game'),ctx=canvas.getContext('2d'),hud=qs('#hud'),toastWrap=qs('#toastWrap');
const dialogueEl=qs('#dialogue'),dialogueSpeaker=qs('#dialogueSpeaker'),dialogueText=qs('#dialogueText'),dialogueChoices=qs('#dialogueChoices');
const eventBanner=qs('#eventBanner'),joystickZone=qs('#joystickZone'),joystickThumb=qs('#joystickThumb');
const mmCanvas=qs('#minimap canvas'),mmCtx=mmCanvas?mmCanvas.getContext('2d'):null;
const btnDungeon=qs('#btnDungeon');
const panels={};qsa('.panel').forEach(p=>{panels[p.id.replace('panel-','')]=p});

// ═══ SPRITE SYSTEM ═══
function createSprite(data,w=16,h=16){const c=document.createElement('canvas');c.width=w;c.height=h;const cx=c.getContext('2d');for(let i=0;i<data.length;i++){if(data[i]){cx.fillStyle=data[i];cx.fillRect(i%w,Math.floor(i/w),1,1)}}return c}
const C={skin:'#e8b89d',skinS:'#c4916e',hair:'#4a3728',hairL:'#6b5040',cloth:'#3a5068',clothL:'#4a6a88',clothD:'#2a3a4d',metal:'#8899aa',metalL:'#aabbcc',metalD:'#667788',leather:'#7a5533',leatherL:'#9a7553',leatherD:'#5a3513',wood:'#8b6914',woodL:'#ab8934',woodD:'#6b4904',fire:'#ff6b35',fire2:'#ff9f1a',fire3:'#ffcc44',veil:'#7b68ee',veil2:'#9b8afb',red:'#dc2626',green:'#3ddc84',blue:'#4fc3f7',gold:'#f59e0b',white:'#f0f4ff',gray:'#9ca3af',dark:'#2a3347',grass1:'#2d5a1e',grass2:'#3a6e2a',grass3:'#4a8038',grass4:'#1e4a12',dirt1:'#6b5233',dirt2:'#7a6243',dirt3:'#8a7253',stone1:'#555f6e',stone2:'#667080',stone3:'#778090',water1:'#1a4a6e',water2:'#2a5a7e',water3:'#3a6a8e',sand1:'#c4a86e',sand2:'#b49858',marsh1:'#2a4a1e',marsh2:'#3a5a28',marsh3:'#1a3a12',ruins1:'#3a3850',ruins2:'#4a4860',ruins3:'#5a5870',tree1:'#1a4a0a',tree2:'#2a5a1a',tree3:'#0a3a00',trunk:'#5a3a1a',trunkD:'#4a2a0a',roof1:'#8b3a2a',roof2:'#6b2a1a',wall1:'#9a8a6a',wall2:'#8a7a5a',corrupt1:'#3a1a3a',corrupt2:'#4a1a4a',corrupt3:'#2a0a2a',dungeon1:'#1a1a2a',dungeon2:'#2a2a3a',dungeon3:'#3a3a4a'};

function makePlayerSprite(dir='down',frame=0,isWalk=false){const s=new Array(256).fill(0),p=(x,y,c)=>{if(x>=0&&x<16&&y>=0&&y<16)s[y*16+x]=c};const bob=(!isWalk&&frame%2===1)?1:0;
if(dir==='up'){p(7,2,C.hair);p(8,2,C.hair);p(6,3,C.hair);p(7,3,C.hair);p(8,3,C.hair);p(9,3,C.hair);p(6,4,C.hair);p(7,4,C.hairL);p(8,4,C.hairL);p(9,4,C.hair);p(7,5,C.skinS);p(8,5,C.skinS)}else{p(7,2,C.hair);p(8,2,C.hair);p(6,3,C.hair);p(7,3,C.skin);p(8,3,C.skin);p(9,3,C.hair);p(6,4,C.hair);p(7,4,C.skin);p(8,4,C.skin);p(9,4,C.hair);p(7,5,C.skinS);p(8,5,C.skinS)}

// ═══ DIALOGUE (expanded with new factions) ═══
const dialogueDefs={
elder:{start:{speaker:'Elder Maelin',text:'The Veil stirs, Walker. Every day it grows thinner. Four powers now compete for Cindergate\'s future. Which burden will you carry?',choices:[{text:'I stand with Cindergate.',next:'town'},{text:'I follow coin—the Roadwardens.',next:'merc'},{text:'Tell me about the Veils.',next:'lore'},{text:'Who are the Scholars and the Order?',next:'factions'}]},town:{speaker:'Elder Maelin',text:'Then let the frontier remember your name. The wilds will test you.',effect:s=>{s.faction.cindergate+=5;setQuestStage('first_steps',1)},choices:[{text:'I understand.',close:true}]},merc:{speaker:'Elder Maelin',text:'The Roadwardens pay well, but their hands are not always clean.',effect:s=>{s.faction.roadwardens+=5},choices:[{text:'Noted.',close:true}]},lore:{speaker:'Elder Maelin',text:'Living barriers called Veils once separated civilization from ancient forces. Now they weaken. Someone—or something—is training our world to live without them.',choices:[{text:'Who is causing this?',next:'cause'},{text:'I should go.',close:true}]},cause:{speaker:'Elder Maelin',text:'The Scholars say natural decay. The Ashen Order says divine will. I say: someone is deliberately tearing them down. Find the truth in the dungeons.',choices:[{text:'I will.',close:true}]},factions:{speaker:'Elder Maelin',text:'The Veil Scholars study the old barriers—seekers of forbidden knowledge. The Ashen Order believes the Veils are chains that must be burned away. Both are dangerous. Both might be right.',choices:[{text:'I\'ll judge for myself.',close:true}]}},
quartermaster:{start:{speaker:'Quartermaster Sen',text:'Walker. What do you need?',choices:[{text:'Got work?',next:'work'},{text:'Settlement upgrades?',next:'settlement'},{text:'Show me the map.',next:'map'},{text:'Later.',close:true}]},work:{speaker:'Quartermaster Sen',text:'Gather from Emberwood, survive a hunt. The bounty board has standing contracts.',effect:s=>{if(getQuest('first_steps').stage===0)setQuestStage('first_steps',1)},choices:[{text:'On it.',close:true}]},settlement:{speaker:'Quartermaster Sen',text:'Cindergate grows with investment. Bring materials and gold for upgrades. A stronger settlement means better gear.',choices:[{text:'I\'ll contribute.',close:true}]},map:{speaker:'Quartermaster Sen',text:'West: Emberwood. South: Mirefen. East: Glass Ruins. Dungeon entrances have been found in each. None want you there.',choices:[{text:'Understood.',close:true}]}},
herbalist:{start:{speaker:'Herbalist Yara',text:'A Walker with all their fingers still. I deal in remedies and awakenings.',choices:[{text:'Awakenings?',next:'awaken'},{text:'What do you sell?',next:'shop'},{text:'Not now.',close:true}]},awaken:{speaker:'Herbalist Yara',text:'Every Walker has a latent class shaped by how they fight, gather, and decide. At level 5, your dominant skill crystallizes. Combat→Warden. Foraging/Crafting→Artificer. Influence→Veilwalker.',choices:[{text:'I\'ll be ready.',close:true}]},shop:{speaker:'Herbalist Yara',text:'Three herbs and a fiber for two tonics. Five herbs and ore for a Veil Elixir.',choices:[{text:'Thanks.',close:true}]}},
smuggler:{start:{speaker:'Kael the Smuggler',text:'*leans in* Laws are flexible. The Roadwardens and I have an arrangement. Want in?',choices:[{text:'What arrangement?',next:'deal'},{text:'I\'m loyal to Cindergate.',next:'refuse'},{text:'Not interested.',close:true}]},deal:{speaker:'Kael the Smuggler',text:'Bring me ruin materials—scrap, ore—I pay triple. Weakens Cindergate\'s supply chain. Gold is gold, right?',effect:s=>{s.faction.roadwardens+=3},choices:[{text:'I\'ll think about it.',close:true}]},refuse:{speaker:'Kael the Smuggler',text:'*shrugs* Loyalty is a luxury. When the Veil cracks and Cindergate starves, remember who offered an alternative.',effect:s=>{s.faction.cindergate+=3},choices:[{text:'We\'ll see.',close:true}]}},
bountyMaster:{start:{speaker:'Bounty Master Rhett',text:'Board\'s full, Walker. Pick a contract, get it done, get paid.',choices:[{text:'Show me bounties.',next:'board'},{text:'Any rare targets?',next:'rare'},{text:'Later.',close:true}]},board:{speaker:'Bounty Master Rhett',text:'Check the Bounty tab. Active contracts listed there.',choices:[{text:'Got it.',close:true}]},rare:{speaker:'Bounty Master Rhett',text:'Ash Drakes, Veil Wraiths, and now Corrupted beasts—creatures warped by the failing Veils. Unique materials. Worth the risk.',choices:[{text:'I don\'t run.',close:true}]}},
scholarLynn:{start:{speaker:'Scholar Lynn',text:'Ah, the Walker everyone is whispering about. I am Lynn of the Veil Scholars. We study the barriers between worlds. I suspect you have more connection to them than you realize.',choices:[{text:'What do you study?',next:'study'},{text:'What do you want from me?',next:'want'},{text:'I\'ve heard you attract Veil beasts.',next:'accusation'},{text:'Not now.',close:true}]},study:{speaker:'Scholar Lynn',text:'The Veils are organic—alive, in a sense. They breathe, flex, and communicate. When a dungeon forms, it\'s the Veil trying to... express something. We need those relics to understand the language.',effect:s=>{s.faction.veilScholars+=3},choices:[{text:'That\'s fascinating.',close:true}]},want:{speaker:'Scholar Lynn',text:'Relic Shards. The dungeons produce them—fragments of the Veil\'s memory. Bring them to me and I\'ll teach you to read the patterns. The rewards are... considerable. Both in knowledge and in power.',effect:s=>{s.faction.veilScholars+=5;if(!getQuest('scholar_quest'))state.quests.push({id:'scholar_quest',name:'The Scholar\'s Collection',stage:0,done:false,desc:'Bring 5 Relic Shards to Scholar Lynn.'})},choices:[{text:'I\'ll bring what I find.',close:true}]},accusation:{speaker:'Scholar Lynn',text:'*pauses* The beasts are not drawn to us. They are drawn to the knowledge we uncover. There is a difference. A subtle one, I grant you. But the Ashen Order\'s answer—burning everything—is no answer at all.',choices:[{text:'Fair point.',close:true},{text:'I\'m not sure I believe you.',close:true}]}},

function buildNodes(){const out=[],push=(tx,ty,zone,type)=>out.push({x:tx*T*SCALE,y:ty*T*SCALE,zone,type,ready:true,respawn:0});
for(let i=0;i<18;i++)push(rand(10,36),rand(7,33),'forest',sample(['branch','fiber','hide','branch','fiber']));
for(let i=0;i<16;i++)push(rand(22,53),rand(47,70),'marsh',sample(['herb','fiber','hide','herb','herb']));
for(let i=0;i<14;i++)push(rand(64,93),rand(12,43),'ruins',sample(['scrap','ore','scrap','ore','herb']));
for(let i=0;i<8;i++)push(rand(41,59),rand(29,43),'town',sample(['branch','fiber','herb']));
// Relic shard nodes near dungeon entrances
dungeonEntrances.forEach(de=>{for(let i=0;i<3;i++)push(de.x+rand(-3,3),de.y+rand(-3,3),de.zone,'relicShard')});
return out}

function buildEnemies(){const out=[],push=(tx,ty,zone,type)=>{const def=enemyDefs[type];out.push({x:tx*T*SCALE,y:ty*T*SCALE,zone,type,hp:def.hp,hpMax:def.hp,alive:true,respawn:0,homeX:tx*T*SCALE,homeY:ty*T*SCALE,patrolAngle:Math.random()*Math.PI*2})};
for(let i=0;i<8;i++)push(rand(10,36),rand(7,33),'forest',sample(['wolf','wolf','wolf','bandit']));
for(let i=0;i<7;i++)push(rand(22,53),rand(47,70),'marsh',sample(['bogling','bogling','wolf']));
for(let i=0;i<6;i++)push(rand(64,93),rand(12,43),'ruins',sample(['sentinel','sentinel','bandit']));
push(rand(15,30),rand(12,28),'forest','ashDrake');
push(rand(70,90),rand(18,38),'ruins','veilWraith');
return out}

function generateBounties(){return[...bountyTemplates].sort(()=>Math.random()-0.5).slice(0,5).map(t=>({...t,progress:0,active:false,completed:false}))}

state=createNewState();

// ═══ HELPERS ═══
function addItem(id,n=1){state.player.inventory[id]=(state.player.inventory[id]||0)+n}
function removeItem(id,n=1){state.player.inventory[id]-=n;if(state.player.inventory[id]<=0)delete state.player.inventory[id]}
function itemCount(id){return state.player.inventory[id]||0}
function totalAtk(){let n=state.player.atkBase;for(const s of Object.values(state.player.equipment))if(s&&itemDefs[s]?.atk)n+=itemDefs[s].atk;state.player.buffs.forEach(b=>{if(b.type==='atk')n+=b.amount});if(state.player.class==='warden')n+=3;if(getFactionTier(state.faction.ashenOrder)>=1)n+=2;return n}
function totalDef(){let n=state.player.defBase;for(const s of Object.values(state.player.equipment))if(s&&itemDefs[s]?.def)n+=itemDefs[s].def;if(state.player.class==='artificer')n+=2;return n}
function getQuest(id){return state.quests.find(q=>q.id===id)}
function setQuestStage(id,stage){const q=getQuest(id);if(q)q.stage=stage}
function completeQuest(id,rewards={}){const q=getQuest(id);if(!q||q.done)return;q.done=true;if(rewards.gold)state.player.gold+=rewards.gold;if(rewards.exp)gainExp(rewards.exp);if(rewards.item)addItem(rewards.item,1);toast(`Quest complete: ${q.name}`,'quest');addLog(`✦ Completed: ${q.name}`)}
function gainExp(amt){if(state.activeEvent?.effect==='doubleXP')amt*=2;state.player.exp+=amt;while(state.player.exp>=state.player.expNext){state.player.exp-=state.player.expNext;state.player.level++;state.player.expNext=Math.floor(state.player.expNext*1.35);state.player.hpMax+=8;state.player.hp=state.player.hpMax;state.player.atkBase+=1;state.player.defBase+=1;toast(`Level up! Now level ${state.player.level}`,'quest');addLog(`⭐ Level ${state.player.level}`);checkClassAwakening()}}
function gainSkill(skill,xp){if(!state.player.skillXp[skill]&&state.player.skillXp[skill]!==0)return;state.player.skillXp[skill]+=xp;const need=state.player.skills[skill]*20;while(state.player.skillXp[skill]>=need){state.player.skillXp[skill]-=need;state.player.skills[skill]++;toast(`${cap(skill)} → ${state.player.skills[skill]}`,'loot')}}
function addLog(msg){state.logs.unshift(msg);if(state.logs.length>50)state.logs.pop()}
function currentZoneAt(x,y){const tx=x/(T*SCALE),ty=y/(T*SCALE);for(const[id,z]of Object.entries(zoneMap))if(tx>=z.x1&&tx<=z.x2&&ty>=z.y1&&ty<=z.y2)return id;return'forest'}
function toast(msg,type='info'){const el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;toastWrap.appendChild(el);setTimeout(()=>el.remove(),4000)}
function spawnParticle(x,y,color,count=5,speed=50){for(let i=0;i<count;i++)state.particles.push({x,y,vx:(Math.random()-0.5)*speed,vy:(Math.random()-0.5)*speed-20,life:0.5+Math.random()*0.5,maxLife:0.5+Math.random()*0.5,color,size:2+Math.random()*3})}
function spawnDamageNumber(x,y,text,color='#ff6b35'){state.particles.push({x,y,vx:0,vy:-40,life:1.2,maxLife:1.2,color,size:0,text,isText:true})}

// ═══ CLASS AWAKENING ═══
function checkClassAwakening(){if(state.player.class||state.player.level<5)return;const sk=state.player.skills;if(sk.combat>=sk.foraging&&sk.combat>=sk.influence){state.player.class='warden';toast('⚔ AWAKENING: Warden! +3 ATK','achievement');addLog('🔥 Awakened as a Warden.')}else if(sk.foraging>=sk.combat&&sk.foraging>=sk.influence){state.player.class='artificer';toast('⚒ AWAKENING: Artificer! +2 DEF','achievement');addLog('⚒ Awakened as an Artificer.')}else{state.player.class='veilwalker';toast('◈ AWAKENING: Veilwalker! +crit','achievement');addLog('◈ Awakened as a Veilwalker.');state.player.critChance+=10}}

// ═══ WORLD MUTATION SYSTEM ═══
function updateWorldMutation(dt){
  const r=state.world.regionState;
  // Corruption spreads terrain changes
  if(r.corruption>30){
    const chance=dt*0.005*(r.corruption/100);
    if(Math.random()<chance){
      // Corrupt a random tile in a random zone
      const zones=['forest','marsh','ruins'];
      const z=zoneMap[sample(zones)];
      const tx=rand(z.x1,z.x2),ty=rand(z.y1,z.y2);
      const i=ty*MW+tx;
      if(terrain[i]!==3&&terrain[i]!==7){// not water or already corrupt
        corruptionMap[i]=Math.min(1,corruptionMap[i]+0.3);
        if(corruptionMap[i]>0.7)terrain[i]=7;// 7=corrupt terrain type
      }
    }
  }
  // Spawn corrupted creatures based on corruption level
  if(r.corruption>40&&Math.random()<dt*0.001){
    const z=zoneMap[sample(['forest','marsh','ruins'])];
    const type=r.corruption>70?'voidSentinel':'corruptWolf';
    const def=enemyDefs[type];
    state.enemies.push({x:rand(z.x1+2,z.x2-2)*T*SCALE,y:rand(z.y1+2,z.y2-2)*T*SCALE,zone:Object.keys(zoneMap).find(k=>zoneMap[k]===z),type,hp:def.hp,hpMax:def.hp,alive:true,respawn:0,homeX:0,homeY:0,patrolAngle:Math.random()*Math.PI*2});
    state.stats.mutationCount++;
  }
  // Ecology affects spawn rates (handled in enemy respawn)
  // Passive drift
  if(Math.random()<dt*0.01){r.corruption=clamp(r.corruption+0.1,0,100);r.stability=clamp(r.stability-0.05,0,100)}
  // Purification from Ashen Order standing
  if(getFactionTier(state.faction.ashenOrder)>=2&&Math.random()<dt*0.005)r.corruption=Math.max(0,r.corruption-0.1);
}

function updateRegionState(zone,cd,sd){const r=state.world.regionState;r.corruption=clamp(r.corruption+cd+(zone==='ruins'?0.5:0),0,100);r.stability=clamp(r.stability+sd,0,100);if(state.settlement.level>=5)r.corruption=Math.max(0,r.corruption-0.5);const f=state.faction;r.favoredFaction=Object.entries(f).sort((a,b)=>b[1]-a[1])[0][0];r.favoredFaction=factionDefs[r.favoredFaction]?.name||'None'}

// ═══ RELIC DUNGEON SYSTEM ═══
function generateDungeon(entrance){
  const floors=entrance.floors;const rooms=[];
  for(let f=0;f<floors;f++){
    const roomCount=3+f;const floorRooms=[];
    for(let r=0;r<roomCount;r++){
      const isBoss=f===floors-1&&r===roomCount-1;
      const enemyCount=isBoss?1:(2+f+rand(0,2));
      const enemies=[];
      for(let e=0;e<enemyCount;e++){
        let type;
        if(isBoss)type='dungeonGuardian';
        else if(f>=floors-2)type=sample(['voidSentinel','sentinel','voidSentinel']);
        else type=sample(['sentinel','bandit','corruptWolf','sentinel']);
        const def=enemyDefs[type];
        const scale=1+f*0.2;// enemies get stronger per floor
        enemies.push({type,hp:Math.floor(def.hp*scale),hpMax:Math.floor(def.hp*scale),alive:true,x:0,y:0});
      }
      const loot=[];
      if(isBoss){loot.push(sample(['voidFragment','relicShard','relicShard','voidFragment']));loot.push(sample(['voidFragment','corruptedHeart','relicShard']))}
      else if(Math.random()>0.5){loot.push(sample(['ore','scrap','relicShard','herb']))}
      floorRooms.push({floor:f,index:r,enemies,loot,cleared:false,isBoss,name:isBoss?'Guardian Chamber':`Room ${r+1}`});
    }
    rooms.push(...floorRooms);
  }
  return rooms;
}

function enterDungeon(entranceIdx){
  const entrance=dungeonEntrances[entranceIdx];
  if(!entrance)return;
  if(state.player.level<entrance.minLevel)return toast(`Need level ${entrance.minLevel} to enter ${entrance.name}.`);
  state.dungeon={active:true,floor:0,rooms:generateDungeon(entrance),currentRoom:0,enemies:[],loot:[],cleared:false,entrance:entranceIdx,name:entrance.name};
  // Position dungeon enemies
  const room=state.dungeon.rooms[0];
  room.enemies.forEach((e,i)=>{e.x=state.player.x+rand(-80,80)*SCALE;e.y=state.player.y+rand(-60,60)*SCALE;e.alive=true});
  state.dungeon.enemies=room.enemies;
  state.stats.dungeonsEntered++;
  toast(`⬡ Entered ${entrance.name} — Floor 1`,'dungeon');
  addLog(`⬡ Descended into ${entrance.name}.`);
  gainSkill('veilsense',5);
  renderPanels();
}

function advanceDungeonRoom(){
  const d=state.dungeon;if(!d.active)return;
  const room=d.rooms[d.currentRoom];
  // Collect loot
  room.loot.forEach(l=>{addItem(l,1);toast(`Found ${itemDefs[l]?.name||l}!`,'loot')});
  room.cleared=true;
  d.currentRoom++;
  if(d.currentRoom>=d.rooms.length){
    // Dungeon cleared!
    d.cleared=true;d.active=false;
    state.stats.dungeonsCleared++;
    const bonusGold=30+d.rooms.length*10;
    state.player.gold+=bonusGold;
    gainExp(50+d.rooms.length*15);
    toast(`⬡ ${d.name} CLEARED! +${bonusGold}g`,'dungeon');
    addLog(`⬡ Cleared ${d.name}! The relic's power flows through you.`);
    gainSkill('veilsense',15);
    // Scholar quest progress
    if(getQuest('scholar_quest')&&!getQuest('scholar_quest').done&&itemCount('relicShard')>=5){completeQuest('scholar_quest',{gold:50,exp:40,item:'scholarsPendant'});state.faction.veilScholars+=15}
  }else{
    const nextRoom=d.rooms[d.currentRoom];
    nextRoom.enemies.forEach((e,i)=>{e.x=state.player.x+rand(-80,80)*SCALE;e.y=state.player.y+rand(-60,60)*SCALE;e.alive=true});
    d.enemies=nextRoom.enemies;
    toast(`Advancing to ${nextRoom.isBoss?'★ BOSS: ':''} ${nextRoom.name}`,'dungeon');
  }
  renderPanels();
}

function exitDungeon(){
  state.dungeon.active=false;
  toast('Escaped the dungeon.','info');
  renderPanels();
}

// ═══ SETTLEMENT ═══
function canUpgradeSettlement(){const next=settlementLevels[state.settlement.level];if(!next||!next.cost)return false;if(state.player.gold<next.cost.gold)return false;for(const[item,count]of Object.entries(next.cost))if(item!=='gold'&&itemCount(item)<count)return false;return true}
function upgradeSettlement(){const next=settlementLevels[state.settlement.level];if(!next||!canUpgradeSettlement())return;state.player.gold-=next.cost.gold;for(const[item,count]of Object.entries(next.cost))if(item!=='gold')removeItem(item,count);state.settlement.level++;const lvl=settlementLevels[state.settlement.level-1];toast(`Settlement → ${lvl.name}!`,'event');addLog(`🏠 Cindergate: ${lvl.name}.`);if(state.settlement.level>=3)state.player.hpMax+=5;if(state.settlement.level>=4){state.player.atkBase+=3;state.player.defBase+=3}renderPanels()}

// ═══ COMBAT ═══
function attackNearest(){
const p=state.player;if(p.attackCooldown>0)return;
// In dungeon, attack dungeon enemies
let enemies=state.dungeon.active?state.dungeon.enemies.filter(e=>e.alive):state.enemies.filter(e=>e.alive&&e.zone===currentZoneAt(p.x,p.y));
const enemy=enemies.sort((a,b)=>dist(p,a)-dist(p,b))[0];
if(!enemy||dist(p,enemy)>60*SCALE)return toast('No enemy in range.');
p.attackCooldown=0.4;const eDef=enemyDefs[enemy.type];
const crit=Math.random()*100<p.critChance+(itemDefs[p.equipment.weapon]?.critBonus||0);
let dmg=Math.max(1,totalAtk()+rand(0,3)-1);if(crit)dmg=Math.floor(dmg*1.8);
// Ashen Order bonus vs corrupted
if(getFactionTier(state.faction.ashenOrder)>=1&&(enemy.type==='corruptWolf'||enemy.type==='voidSentinel'))dmg+=3;
enemy.hp-=dmg;gainSkill('combat',4);state.stats.totalDamageDealt+=dmg;state.stats.pacifistStreak=0;
spawnParticle(enemy.x,enemy.y,crit?'#ffcc44':'#ff6b35',crit?8:5);
spawnDamageNumber(enemy.x,enemy.y-20,crit?`CRIT ${dmg}`:`${dmg}`,crit?'#ffcc44':'#ff6b35');
if(enemy.hp<=0){
  enemy.alive=false;state.stats.kills++;
  if(enemy.type==='wolf')state.stats.wolfKills++;
  if(enemy.type==='ashDrake')state.stats.drakeKills++;
  if(enemy.type==='veilWraith')state.stats.wraithKills++;
  if(enemy.type==='corruptWolf'||enemy.type==='voidSentinel')state.stats.corruptKills++;
  gainExp(eDef.exp);const goldDrop=eDef.gold+rand(0,3);state.player.gold+=goldDrop;
  const drop=sample(eDef.drops);addItem(drop,1);
  spawnParticle(enemy.x,enemy.y,'#3ddc84',10,80);
  toast(`${eDef.name} defeated! +${goldDrop}g +${itemDefs[drop]?.name||drop}`,'combat');
  addLog(`⚔ Defeated ${eDef.name}.`);
  // Bounty
  if(state.activeBounty&&!state.activeBounty.completed&&state.activeBounty.target===enemy.type&&!state.activeBounty.gather){state.activeBounty.progress++;if(state.activeBounty.progress>=state.activeBounty.count)completeBounty()}
  // Ashen quest
  const aq=getQuest('ashen_quest');if(aq&&!aq.done&&(enemy.type==='corruptWolf'||enemy.type==='voidSentinel')){aq.stage++;if(aq.stage>=5){completeQuest('ashen_quest',{gold:60,exp:50,item:'ashenSignet'});state.faction.ashenOrder+=15}}
  // Quest progress
  const zone=currentZoneAt(p.x,p.y);
  if(zone==='forest'&&getQuest('wild_proof')?.stage<2)setQuestStage('wild_proof',2);
  if(getQuest('wild_proof')?.stage>=2&&!getQuest('wild_proof')?.done)completeQuest('wild_proof',{gold:18,exp:20});
  // Ecology
  if(enemy.type==='wolf')state.world.ecology.wolfPop=Math.max(0.3,state.world.ecology.wolfPop-0.02);
  if(enemy.type==='bogling')state.world.ecology.boglingPop=Math.max(0.3,state.world.ecology.boglingPop-0.02);
  if(!state.dungeon.active)updateRegionState(zone,-2,+2);
  enemy.respawn=state.time+12+Math.random()*15;
  // Dungeon: check if room cleared
  if(state.dungeon.active&&state.dungeon.enemies.every(e=>!e.alive)){advanceDungeonRoom()}
}else{
  const ret=Math.max(1,eDef.atk-totalDef()+rand(0,2));
  if(p.invincible<=0){p.hp-=ret;state.stats.totalDamageReceived+=ret;spawnDamageNumber(p.x,p.y-20,`${ret}`,'#dc2626');spawnParticle(p.x,p.y,'#dc2626',3)}

function openDialogue(id,nk){const tree=dialogueDefs[id];if(!tree)return;const node=tree[nk];if(!node)return;state.currentDialogue={id,node:nk};if(typeof node.effect==='function')node.effect(state);gainSkill('influence',3);dialogueSpeaker.textContent=node.speaker;dialogueText.textContent=node.text;dialogueChoices.innerHTML='';node.choices.forEach(ch=>{const b=document.createElement('button');b.textContent=ch.text;b.onclick=()=>{if(ch.close)return closeDialogue();if(ch.next)openDialogue(id,ch.next)};dialogueChoices.appendChild(b)});dialogueEl.style.display='block';renderAll()}

function craft(rid){const recipe=recipes.find(r=>r.id===rid);if(!recipe||!canCraft(recipe))return;Object.entries(recipe.needs).forEach(([id,n])=>removeItem(id,n));addItem(recipe.makes,recipe.count||1);gainSkill('crafting',6);state.stats.crafts++;toast(`Crafted ${recipe.name}`,'loot');addLog(`⚒ Crafted ${recipe.name}.`);renderPanels()}

function equipItem(id){const def=itemDefs[id];if(!def||!def.slot)return;const prev=state.player.equipment[def.slot];if(prev)addItem(prev,1);state.player.equipment[def.slot]=id;removeItem(id,1);toast(`Equipped ${def.name}`);renderPanels()}

function acceptBounty(idx){if(state.activeBounty&&!state.activeBounty.completed)return toast('Complete current bounty first.');const b=state.bounties[idx];if(!b||b.completed)return;b.active=true;b.progress=0;state.activeBounty=b;toast(`Bounty: ${b.name}`,'event');addLog(`📜 Bounty: ${b.name}`);renderPanels()}

if(t.effect==='spawnRare'){const rt=Math.random()>0.5?'ashDrake':'veilWraith';const z=zoneMap[rt==='ashDrake'?'forest':'ruins'];const def=enemyDefs[rt];state.enemies.push({x:rand(z.x1+5,z.x2-5)*T*SCALE,y:rand(z.y1+5,z.y2-5)*T*SCALE,zone:rt==='ashDrake'?'forest':'ruins',type:rt,hp:def.hp,hpMax:def.hp,alive:true,respawn:0,homeX:0,homeY:0,patrolAngle:Math.random()*Math.PI*2})}

// ═══ UPDATE LOOP ═══
function update(dt){
state.time+=dt;state.dayTime+=dt;
if(state.dayTime>=240){state.dayTime=0;state.day++;state.stats.nightsSurvived++;state.world.ecology.wolfPop=Math.min(1.5,state.world.ecology.wolfPop+0.01);state.world.ecology.boglingPop=Math.min(1.5,state.world.ecology.boglingPop+0.01)}
const p=state.player;p.attackCooldown=Math.max(0,p.attackCooldown-dt);p.invincible=Math.max(0,p.invincible-dt);
p.buffs=p.buffs.filter(b=>{b.remaining-=dt;return b.remaining>0});
if(!state.currentDialogue){
const kx=(state.input.KeyD||state.input.ArrowRight?1:0)-(state.input.KeyA||state.input.ArrowLeft?1:0);
const ky=(state.input.KeyS||state.input.ArrowDown?1:0)-(state.input.KeyW||state.input.ArrowUp?1:0);
const mx=clamp(kx+state.touchMove.x,-1,1),my=clamp(ky+state.touchMove.y,-1,1);
const maxSpd=p.speed;if(mx||my){const len=Math.hypot(mx,my)||1;const dx=mx/len,dy=my/len;const tVx=dx*maxSpd,tVy=dy*maxSpd;const lerp=Math.min(1,12*dt);p.vx+=(tVx-p.vx)*lerp;p.vy+=(tVy-p.vy)*lerp;if(Math.abs(mx)>Math.abs(my))p.facing=mx>0?'right':'left';else p.facing=my>0?'down':'up';p.isMoving=true}else{const spd=Math.hypot(p.vx,p.vy);if(spd>1){const f=Math.max(0,1-10*dt);p.vx*=f;p.vy*=f}else{p.vx=0;p.vy=0}p.isMoving=Math.hypot(p.vx,p.vy)>5}p.x+=p.vx*dt*SCALE;p.y+=p.vy*dt*SCALE;if(p.isMoving){p.animTimer+=dt*(Math.hypot(p.vx,p.vy)/maxSpd+0.5);if(p.animTimer>0.12){p.animTimer=0;p.animFrame=(p.animFrame+1)%4}}else{p.animTimer+=dt;if(p.animTimer>0.8){p.animTimer=0;p.animFrame=(p.animFrame+1)%2}}}
p.x=clamp(p.x,T*SCALE*4,MW*T*SCALE-T*SCALE*4);p.y=clamp(p.y,T*SCALE*3,MH*T*SCALE-T*SCALE*4);
const prevZone=state.world.activeZone;state.world.activeZone=currentZoneAt(p.x,p.y);
if(state.world.activeZone!==prevZone){state.stats.zonesVisited.add(state.world.activeZone);gainSkill('survival',3)}
// Dungeon button visibility
const nearDungeon=dungeonEntrances.some(d=>Math.hypot(d.x*T*SCALE-p.x,d.y*T*SCALE-p.y)<60*SCALE);
btnDungeon.style.display=nearDungeon&&!state.dungeon.active?'flex':'none';
// Nodes
state.nodes.forEach(n=>{if(!n.ready&&state.time>=n.respawn)n.ready=true});
// Enemy AI (overworld)
if(!state.dungeon.active){
state.enemies.forEach(e=>{if(!e.alive&&state.time>=e.respawn){e.alive=true;e.hp=e.hpMax}if(!e.alive)return;if(e.zone===state.world.activeZone){const d=dist(e,p);if(d<180*SCALE){const dx=p.x-e.x,dy=p.y-e.y,len=Math.hypot(dx,dy)||1;const spd=(25+(zoneMap[e.zone]?.danger||0)*8)*SCALE;e.x+=(dx/len)*spd*dt;e.y+=(dy/len)*spd*dt;if(d<20*SCALE&&p.invincible<=0){const eDef=enemyDefs[e.type];const dmg=Math.max(1,eDef.atk-totalDef()+rand(0,1));p.hp-=dmg;p.invincible=0.5;state.stats.totalDamageReceived+=dmg;spawnDamageNumber(p.x,p.y-20,`${dmg}`,'#dc2626');spawnParticle(p.x,p.y,'#dc2626',3);if(p.hp<=0){p.hp=p.hpMax;p.x=50*T*SCALE;p.y=36*T*SCALE;p.gold=Math.max(0,p.gold-12);state.stats.deaths++;toast('Fell.','combat');addLog('💀 Fell.')}}}else{e.patrolAngle+=dt*0.5;e.x=e.homeX+Math.cos(e.patrolAngle)*30*SCALE;e.y=e.homeY+Math.sin(e.patrolAngle)*30*SCALE}}});
}else{
// Dungeon enemy AI
state.dungeon.enemies.forEach(e=>{if(!e.alive)return;const d=dist(e,p);if(d<200*SCALE){const dx=p.x-e.x,dy=p.y-e.y,len=Math.hypot(dx,dy)||1;e.x+=(dx/len)*35*SCALE*dt;e.y+=(dy/len)*35*SCALE*dt;if(d<20*SCALE&&p.invincible<=0){const eDef=enemyDefs[e.type];const dmg=Math.max(1,eDef.atk-totalDef()+rand(0,2));p.hp-=dmg;p.invincible=0.5;state.stats.totalDamageReceived+=dmg;spawnDamageNumber(p.x,p.y-20,`${dmg}`,'#dc2626');spawnParticle(p.x,p.y,'#dc2626',3);if(p.hp<=0){p.hp=p.hpMax;p.x=50*T*SCALE;p.y=36*T*SCALE;p.gold=Math.max(0,p.gold-12);state.stats.deaths++;state.dungeon.active=false;toast('Fell in dungeon.','combat');addLog('💀 Ejected from dungeon.')}}}})
}
// Particles
state.particles=state.particles.filter(pt=>{pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vy+=80*dt;pt.life-=dt;return pt.life>0});
// Quest auto
if(getQuest('first_steps')?.stage===2&&!getQuest('first_steps')?.done){completeQuest('first_steps',{gold:12,exp:14});setQuestStage('wild_proof',1)}
if(!state.flags.tutorialShown){state.flags.tutorialShown=true;toast('Mobile: joystick + buttons. PC: WASD move, SPACE attack, F gather, E interact, R dungeon.','info')}
const cssW=canvas.clientWidth||1,cssH=canvas.clientHeight||1;
state.camera.x=clamp(p.x-cssW*0.5,0,MW*T*SCALE-cssW);state.camera.y=clamp(p.y-cssH*0.5,0,MH*T*SCALE-cssH);
trySpawnEvent();updateEvent(dt);updateWorldMutation(dt);
if(Math.floor(state.time*2)!==Math.floor((state.time-dt)*2)){checkAchievements();checkStoryProgress()}
}

const p=state.player,pDir=p.facing==='left'?'right':p.facing,pSpr=p.isMoving?sprites.player.walk[pDir][p.animFrame%4]:sprites.player.idle[pDir][p.animFrame%2];
const pBob=p.isMoving?Math.sin(state.time*12)*1.5:Math.sin(state.time*2)*0.5;
drawables.push({y:p.y+T*SCALE*0.6,draw:()=>{ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(p.x,p.y+T*SCALE*0.55,T*SCALE*0.4,T*SCALE*0.15,0,0,Math.PI*2);ctx.fill();if(p.invincible>0&&Math.floor(p.invincible*10)%2)ctx.globalAlpha=0.5;const flip=p.facing==='left';if(flip){ctx.save();ctx.translate(p.x,0);ctx.scale(-1,1);ctx.drawImage(pSpr,-T*SCALE*0.5,p.y-T*SCALE*0.7+pBob,T*SCALE,T*SCALE*1.3);ctx.restore()}else ctx.drawImage(pSpr,p.x-T*SCALE*0.5,p.y-T*SCALE*0.7+pBob,T*SCALE,T*SCALE*1.3);ctx.globalAlpha=1;const bw=T*SCALE*0.9,bh=4;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(p.x-bw/2,p.y-T*SCALE*0.8,bw,bh);ctx.fillStyle=p.hp/p.hpMax>0.3?'#60a5fa':'#dc2626';ctx.fillRect(p.x-bw/2,p.y-T*SCALE*0.8,bw*(p.hp/p.hpMax),bh)}});
drawables.sort((a,b)=>a.y-b.y);drawables.forEach(d=>d.draw());
// Particles
state.particles.forEach(pt=>{ctx.globalAlpha=pt.life/pt.maxLife;if(pt.isText){ctx.font='bold 12px "JetBrains Mono",monospace';ctx.fillStyle=pt.color;ctx.textAlign='center';ctx.fillText(pt.text,pt.x,pt.y);ctx.textAlign='left'}else{ctx.fillStyle=pt.color;ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size)}ctx.globalAlpha=1});
// Night overlay
if(nightAmount>0.01){ctx.fillStyle=`rgba(5,5,20,${nightAmount})`;ctx.fillRect(state.camera.x,state.camera.y,cssW,cssH);const grd=ctx.createRadialGradient(p.x,p.y,10,p.x,p.y,200*SCALE);grd.addColorStop(0,`rgba(255,170,80,${nightAmount*0.15})`);grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fillRect(p.x-200*SCALE,p.y-200*SCALE,400*SCALE,400*SCALE)}
// Corruption/Dungeon overlay
if(state.world.regionState.corruption>40){ctx.fillStyle=`rgba(100,30,150,${(state.world.regionState.corruption-40)/60*0.08})`;ctx.fillRect(state.camera.x,state.camera.y,cssW,cssH)}
if(state.dungeon.active){ctx.fillStyle='rgba(5,0,20,0.15)';ctx.fillRect(state.camera.x,state.camera.y,cssW,cssH);
// Dungeon veil particles
for(let i=0;i<3;i++){const px=state.camera.x+Math.random()*cssW,py=state.camera.y+Math.random()*cssH;ctx.globalAlpha=0.1+Math.random()*0.1;ctx.fillStyle='#7b68ee';ctx.fillRect(px,py,2,2);ctx.globalAlpha=1}}
ctx.restore()}

// Minimap
function drawMinimap(){if(!mmCtx)return;const mw=mmCanvas.width,mh=mmCanvas.height;mmCtx.fillStyle='#08090d';mmCtx.fillRect(0,0,mw,mh);const sx=mw/MW,sy=mh/MH;
for(let y=0;y<MH;y+=2)for(let x=0;x<MW;x+=2){const t=terrain[y*MW+x];mmCtx.fillStyle=['#2d5a1e','#6b5233','#555f6e','#1a4a6e','#2a4a1e','#3a3850','#c4a86e','#3a1a3a'][t]||'#18202a';mmCtx.fillRect(x*sx,y*sy,sx*2+1,sy*2+1)}
const px=(state.player.x/(MW*T*SCALE))*mw,py=(state.player.y/(MH*T*SCALE))*mh;mmCtx.fillStyle='#fff';mmCtx.fillRect(px-2,py-2,4,4);
state.enemies.forEach(e=>{if(!e.alive)return;const ex=(e.x/(MW*T*SCALE))*mw,ey=(e.y/(MH*T*SCALE))*mh;mmCtx.fillStyle=enemyDefs[e.type]?.rarity==='rare'?'#f59e0b':'#dc2626';mmCtx.fillRect(ex-1,ey-1,2,2)});
dungeonEntrances.forEach(de=>{const dx=(de.x/MW)*mw,dy=(de.y/MH)*mh;mmCtx.fillStyle='#7b68ee';mmCtx.fillRect(dx-2,dy-2,4,4)});
state.npcs.forEach(n=>{const nx=(n.x/(MW*T*SCALE))*mw,ny=(n.y/(MH*T*SCALE))*mh;mmCtx.fillStyle='#f59e0b';mmCtx.fillRect(nx-1,ny-1,3,3)})}

// ═══ HUD ═══
function renderHud(){const p=state.player,zone=zoneMap[state.world.activeZone]||{name:'Unknown'},ti=state.dayTime<120?'☀':'☾',cls=p.class?` • ${cap(p.class)}`:'';
hud.innerHTML=`<div class="hud-bar"><span class="icon">♥</span><span class="label">HP</span><div style="width:100px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden"><div class="hp-fill" style="width:${(p.hp/p.hpMax)*100}%;background:${p.hp/p.hpMax>0.3?'linear-gradient(90deg,#3b82f6,#60a5fa)':'linear-gradient(90deg,#dc2626,#ef4444)'}"></div></div><span class="value">${p.hp}/${p.hpMax}</span></div>
<div class="hud-bar"><span class="icon">⬥</span><span class="label">Lv</span><span class="value">${p.level}${cls}</span></div>
<div class="hud-bar"><span class="icon">${ti}</span><span class="label">${zone.name}</span><span class="value">Day ${state.day}</span></div>
<div class="hud-bar"><span class="icon">⚔</span><span class="value">${totalAtk()}</span><span class="icon" style="margin-left:6px">🛡</span><span class="value">${totalDef()}</span><span class="icon" style="margin-left:6px">💰</span><span class="value">${p.gold}</span></div>
${state.dungeon.active?`<div class="hud-bar" style="border-color:rgba(123,104,238,.4);color:#9b8afb"><span class="icon">⬡</span><span class="value">DUNGEON: ${state.dungeon.name} Room ${state.dungeon.currentRoom+1}/${state.dungeon.rooms.length}</span></div>`:''}
${state.activeEvent?`<div class="hud-bar" style="border-color:rgba(245,158,11,.4);color:#fbbf24"><span class="icon">⚡</span><span class="value">${state.activeEvent.name} (${Math.ceil(state.activeEvent.timeLeft)}s)</span></div>`:''}
${state.activeBounty&&!state.activeBounty.completed?`<div class="hud-bar" style="border-color:rgba(255,107,53,.3)"><span class="icon">📜</span><span class="tiny">${state.activeBounty.name}: ${state.activeBounty.progress}/${state.activeBounty.count}</span></div>`:''}`}

// ═══ PANELS ═══
function renderPanels(){
const p=state.player;

// Journal
panels.journal.innerHTML=`<div class="card"><h3>⬥ Walker's Journal</h3><p>The Veils weaken. You are a Walker.${p.class?` Awakened as <strong class="fire">${cap(p.class)}</strong>.`:' Awakening at Lv 5.'}</p></div>
<div class="card"><h3>Active Quests</h3><div class="list">${state.quests.map(q=>`<div class="item"><div><strong>${q.name}</strong> <span class="badge ${q.done?'badge-done':'badge-quest'}">${q.done?'Done':'Stage '+q.stage}</span><div class="tiny">${q.desc}</div></div></div>`).join('')}</div></div>
<div class="card"><h3>Recent Log</h3><div class="list">${state.logs.slice(0,8).map(l=>`<div class="item"><div class="tiny">${l}</div></div>`).join('')}</div></div>`;

// Story
const storyHTML=storyChapters.map(ch=>{const stages=ch.stages.map(st=>{const done=st.complete;return`<div class="item" style="${done?'border-color:rgba(155,138,251,.3);background:rgba(155,138,251,.04)':'opacity:.6'}"><div><strong>${st.name}</strong>${done?' <span class="badge badge-chapter">Done</span>':''}<div class="tiny">${st.desc}</div></div></div>`}).join('');return`<div class="card"><h3>${ch.name}</h3><div class="list">${stages}</div></div>`}).join('');
panels.story.innerHTML=`<div class="card"><h3>⬥ The Story of Ashveil</h3><p class="tiny">Your choices shape the narrative. Story progresses through exploration, combat, faction loyalty, and dungeon delving.</p></div>${storyHTML}`;

// Inventory
const inv=Object.entries(p.inventory);
panels.inventory.innerHTML=`<div class="card"><h3>⬥ Inventory</h3><p class="tiny">${inv.length} types</p></div><div class="card"><div class="list">${inv.length?inv.map(([id,cnt])=>{const it=itemDefs[id];if(!it)return'';const rc='rarity-'+(it.rarity||'common');const act=it.type==='consumable'?`<button class="item-btn" onclick="W.useItem('${id}')">Use</button>`:it.slot?`<button class="item-btn" onclick="W.equipItem('${id}')">Equip</button>`:'';return`<div class="item"><div><strong class="${rc}">${it.name}</strong><div class="tiny">x${cnt} • ${cap(it.type)}</div></div>${act}</div>`}).join(''):'<div class="item"><div class="tiny">Empty.</div></div>'}</div></div>`;

// Equipment
panels.equip.innerHTML=`<div class="card"><h3>⬥ Equipment</h3></div><div class="card"><div class="equipGrid">${['weapon','body','trinket'].map(s=>{const id=p.equipment[s],it=id?itemDefs[id]:null,rc=it?'rarity-'+(it.rarity||'common'):'';return`<div class="slot"><div class="slot-label">${cap(s)}</div><div class="slot-item ${rc}">${it?it.name:'—'}</div>${it?`<div class="tiny" style="margin-top:4px">${it.atk?'+'+it.atk+' ATK ':''}${it.def?'+'+it.def+' DEF ':''}</div><button class="item-btn" style="margin-top:4px" onclick="W.unequip('${s}')">Remove</button>`:''}</div>`}).join('')}</div></div><div class="card"><div class="row"><span>Attack</span><strong class="fire">${totalAtk()}</strong></div><div class="row"><span>Defense</span><strong class="veil">${totalDef()}</strong></div><div class="row"><span>Crit</span><strong class="gold">${p.critChance}%</strong></div></div>`;

// Skills
panels.skills.innerHTML=`<div class="card"><h3>⬥ Skills</h3>${p.class?`<p class="tiny">Class: <strong class="fire">${cap(p.class)}</strong></p>`:'<p class="tiny">Lv 5 to awaken.</p>'}</div>${Object.entries(p.skills).map(([sk,lv])=>{const xp=p.skillXp[sk],need=lv*20;return`<div class="card"><div class="row"><strong>${cap(sk)}</strong><span class="veil">${lv}</span></div><div class="meter"><div class="meter-fill meter-skill" style="width:${(xp/need)*100}%"></div></div><div class="tiny">${xp}/${need} xp</div></div>`}).join('')}<div class="card"><div class="row"><strong>Level</strong><span class="fire">${p.level}</span></div><div class="meter"><div class="meter-fill meter-xp" style="width:${(p.exp/p.expNext)*100}%"></div></div><div class="tiny">${p.exp}/${p.expNext} xp</div></div>`;

// Crafting
panels.crafting.innerHTML=`<div class="card"><h3>⬥ Crafting</h3></div><div class="card"><div class="list">${recipes.map(r=>{const can=canCraft(r),rc='rarity-'+(itemDefs[r.makes]?.rarity||'common');return`<div class="item"><div><strong class="${rc}">${r.name}</strong><div class="tiny">${Object.entries(r.needs).map(([id,n])=>`${itemDefs[id]?.name||id} ${itemCount(id)}/${n}`).join(', ')}</div></div><button class="item-btn" ${can?'':'disabled'} onclick="W.craft('${r.id}')">Craft</button></div>`}).join('')}</div></div>`;

// Bounty
panels.bounty.innerHTML=`<div class="card"><h3>⬥ Bounty Board</h3></div>${state.activeBounty&&!state.activeBounty.completed?`<div class="card" style="border-color:rgba(255,107,53,.3)"><h4>Active: ${state.activeBounty.name}</h4><p class="tiny">${state.activeBounty.desc}</p><div class="meter" style="margin-top:6px"><div class="meter-fill" style="width:${(state.activeBounty.progress/state.activeBounty.count)*100}%;background:linear-gradient(90deg,#ff6b35,#ff9f1a)"></div></div><div class="tiny">${state.activeBounty.progress}/${state.activeBounty.count}</div></div>`:''}<div class="card"><div class="list">${state.bounties.map((b,i)=>`<div class="item"><div><strong>${b.name}</strong> <span class="badge ${b.completed?'badge-done':b.active?'badge-bounty':'badge-event'}">${b.completed?'Done':b.active?'Active':'Open'}</span><div class="tiny">${b.desc}</div><div class="tiny gold">${b.reward.gold}g ${b.reward.exp}xp${b.reward.item?' +'+itemDefs[b.reward.item]?.name:''}</div></div>${!b.active&&!b.completed?`<button class="item-btn" onclick="W.acceptBounty(${i})">Accept</button>`:''}</div>`).join('')}</div></div>`;

// Factions (4 factions!)
panels.factions.innerHTML=`<div class="card"><h3>⬥ Factions</h3><p class="tiny">Four powers compete. Your standing shapes the world.</p></div><div class="faction-grid">${Object.entries(factionDefs).map(([id,f])=>{const standing=state.faction[id]||0;const tier=getFactionTier(standing);const tierName=f.tiers[tier];return`<div class="faction-card${tier>=2?' highlight':''}"><div style="font-size:20px">${f.icon}</div><strong style="color:${f.color}">${f.name}</strong><div class="tiny">${tierName} (${standing})</div><div class="meter" style="margin:4px 0"><div class="meter-fill" style="width:${Math.min(100,standing)}%;background:${f.color}"></div></div><div class="tiny">${f.perks[tier]||''}</div><button class="item-btn" style="margin-top:4px" onclick="W.chooseFaction('${id}')">Support</button></div>`}).join('')}</div><div class="card"><p class="tiny">${factionDefs[Object.entries(state.faction).sort((a,b)=>b[1]-a[1])[0]?.[0]]?.desc||''}</p></div>`;

// World
const r=state.world.regionState,sl=settlementLevels[state.settlement.level-1],nsl=settlementLevels[state.settlement.level];
panels.world.innerHTML=`<div class="card"><h3>⬥ World State</h3></div><div class="card"><h4>Corruption</h4><div class="meter"><div class="meter-fill meter-corruption" style="width:${r.corruption}%"></div></div><div class="tiny">${Math.floor(r.corruption)}% — ${r.corruption>60?'World darkens.':r.corruption>30?'Shadows creep.':'Stable.'}</div></div><div class="card"><h4>Stability</h4><div class="meter"><div class="meter-fill meter-stability" style="width:${r.stability}%"></div></div><div class="tiny">${Math.floor(r.stability)}% — Favored: ${r.favoredFaction}</div></div>
<div class="card"><h4>Ecology</h4><div class="row"><span>Wolf Pop</span><span class="tiny">${(state.world.ecology.wolfPop*100).toFixed(0)}%</span></div><div class="row"><span>Bogling Pop</span><span class="tiny">${(state.world.ecology.boglingPop*100).toFixed(0)}%</span></div><div class="tiny" style="margin-top:4px">Overhunting reduces populations. They recover over time. High corruption spawns mutants.</div></div>
<div class="card"><h4>Settlement: ${sl.name} (Lv ${state.settlement.level})</h4><p class="tiny">${sl.desc}</p><p class="tiny nature">${sl.benefits}</p>${nsl?`<div style="margin-top:8px"><h4>Next: ${nsl.name}</h4><div class="tiny">${Object.entries(nsl.cost).map(([k,v])=>`${cap(k)}: ${k==='gold'?state.player.gold:itemCount(k)}/${v}`).join(', ')}</div><button class="item-btn" style="margin-top:6px" ${canUpgradeSettlement()?'':'disabled'} onclick="W.upgradeSettlement()">Upgrade</button></div>`:'<div class="tiny gold" style="margin-top:4px">Max level!</div>'}</div>`;

// Dungeon
const d=state.dungeon;
panels.dungeon.innerHTML=`<div class="card"><h3>⬥ Relic Dungeons</h3><p class="tiny">Ancient structures formed by failing Veils. Dangerous but rich with relics.</p></div>
${d.active?`<div class="card" style="border-color:rgba(123,104,238,.4)"><h4>⬡ Active: ${d.name}</h4><div class="tiny">Room ${d.currentRoom+1}/${d.rooms.length} — Enemies: ${d.enemies.filter(e=>e.alive).length} alive</div><button class="item-btn" style="margin-top:6px" onclick="W.exitDungeon()">Flee Dungeon</button></div>`:''}
<div class="card"><h3>Dungeon Entrances</h3><div class="list">${dungeonEntrances.map((de,i)=>`<div class="item"><div><strong class="veil">${de.name}</strong><div class="tiny">Zone: ${de.zone} • Min Lv ${de.minLevel} • ${de.floors} floors</div></div>${!d.active?`<button class="item-btn" onclick="W.enterDungeon(${i})">Enter</button>`:''}</div>`).join('')}</div></div>
<div class="card"><h4>Dungeon Stats</h4><div class="row"><span>Entered</span><span class="tiny">${state.stats.dungeonsEntered}</span></div><div class="row"><span>Cleared</span><span class="tiny">${state.stats.dungeonsCleared}</span></div></div>`;

// Achievements
panels.achieve.innerHTML=`<div class="card"><h3>⬥ Achievements</h3><p class="tiny">${state.achievements.length}/${achievementDefs.length}</p></div><div class="card"><div class="list">${achievementDefs.map(a=>{const u=state.achievements.includes(a.id);return`<div class="item" style="${u?'border-color:rgba(79,195,247,.3);background:rgba(79,195,247,.04)':'opacity:.5'}"><div><strong>${a.icon} ${a.name}</strong>${u?' <span class="badge badge-achievement">✓</span>':''}<div class="tiny">${a.desc}</div></div></div>`}).join('')}</div></div>
<div class="card"><h3>Stats</h3><div class="row"><span>Kills</span><span class="tiny">${state.stats.kills}</span></div><div class="row"><span>Gathers</span><span class="tiny">${state.stats.gathers}</span></div><div class="row"><span>Crafts</span><span class="tiny">${state.stats.crafts}</span></div><div class="row"><span>Deaths</span><span class="tiny">${state.stats.deaths}</span></div><div class="row"><span>Bounties</span><span class="tiny">${state.stats.bountiesCompleted}</span></div><div class="row"><span>Dungeons Cleared</span><span class="tiny">${state.stats.dungeonsCleared}</span></div><div class="row"><span>Corrupt Kills</span><span class="tiny">${state.stats.corruptKills}</span></div><div class="row"><span>Mutations</span><span class="tiny">${state.stats.mutationCount}</span></div><div class="row"><span>Damage Dealt</span><span class="tiny">${state.stats.totalDamageDealt}</span></div><div class="row"><span>Zones Found</span><span class="tiny">${state.stats.zonesVisited.size}/4</span></div></div>`;
}

function renderAll(){renderHud();renderPanels()}

// ═══ RESIZE ═══
function resize(){const rect=canvas.getBoundingClientRect(),ratio=window.devicePixelRatio||1;canvas.width=Math.floor(rect.width*ratio);canvas.height=Math.floor(rect.height*ratio);ctx.setTransform(ratio,0,0,ratio,0,0);ctx.imageSmoothingEnabled=false}

// ═══ ORIENTATION LOCK (MOBILE) ═══
(function lockLandscape(){
if('ontouchstart' in window||navigator.maxTouchPoints>0){
try{screen.orientation.lock('landscape').catch(function(){});}catch(e){}
}
})();

// ═══ INPUT ═══
let joystickActive=false;
function updateJV(x,y){joystickThumb.style.transform=`translate(${x}px,${y}px)`}
function resetJ(){state.touchMove.x=0;state.touchMove.y=0;joystickActive=false;updateJV(0,0)}
function handleJ(cx,cy){const rect=joystickZone.getBoundingClientRect(),dx=cx-(rect.left+rect.width/2),dy=cy-(rect.top+rect.height/2),max=36,len=Math.hypot(dx,dy)||1,c=Math.min(len,max),nx=(dx/len)*c,ny=(dy/len)*c;state.touchMove.x=nx/max;state.touchMove.y=ny/max;updateJV(nx,ny)}
joystickZone?.addEventListener('pointerdown',e=>{joystickActive=true;joystickZone.setPointerCapture(e.pointerId);handleJ(e.clientX,e.clientY)});
joystickZone?.addEventListener('pointermove',e=>{if(joystickActive)handleJ(e.clientX,e.clientY)});
joystickZone?.addEventListener('pointerup',resetJ);joystickZone?.addEventListener('pointercancel',resetJ);
qs('#touchAttack')?.addEventListener('click',attackNearest);qs('#touchLoot')?.addEventListener('click',gatherNearest);qs('#touchTalk')?.addEventListener('click',interactNearest);
window.addEventListener('keydown',e=>{state.input[e.code]=true;if(e.code==='Space'){e.preventDefault();attackNearest()}if(e.code==='KeyE')interactNearest();if(e.code==='KeyF')gatherNearest();if(e.code==='KeyR'){const de=dungeonEntrances.find(d=>Math.hypot(d.x*T*SCALE-state.player.x,d.y*T*SCALE-state.player.y)<60*SCALE);if(de&&!state.dungeon.active)enterDungeon(dungeonEntrances.indexOf(de))}if(e.code==='Escape')closeDialogue()});
window.addEventListener('keyup',e=>state.input[e.code]=false);
qs('#btnAttack').onclick=attackNearest;qs('#btnLoot').onclick=gatherNearest;qs('#btnTalk').onclick=interactNearest;qs('#btnSave').onclick=saveGame;qs('#btnLoad').onclick=loadGame;
qs('#btnFullscreen').onclick=()=>{if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>toast('Fullscreen not supported','info'));}else{document.exitFullscreen();}};
qs('#btnDungeon').onclick=()=>{const de=dungeonEntrances.find(d=>Math.hypot(d.x*T*SCALE-state.player.x,d.y*T*SCALE-state.player.y)<60*SCALE);if(de&&!state.dungeon.active)enterDungeon(dungeonEntrances.indexOf(de))};
qsa('.tabBtn').forEach(btn=>btn.onclick=()=>{qsa('.tabBtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const id=btn.dataset.tab;Object.entries(panels).forEach(([key,el])=>el.classList.toggle('active',key===id))});
window.addEventListener('resize',()=>{resize();renderAll()});

window.W={craft,equipItem,unequip,useItem,chooseFaction,acceptBounty,upgradeSettlement,enterDungeon,exitDungeon};

// ═══ GAME LOOP ═══
let last=performance.now();
function loop(now){const dt=Math.min(0.033,(now-last)/1000);last=now;update(dt);drawMap();renderHud();if(Math.floor(state.time)%2===0&&Math.floor(state.time)!==Math.floor(state.time-dt))drawMinimap();requestAnimationFrame(loop)}
resize();renderAll();drawMinimap();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
